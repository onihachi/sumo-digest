name: 取組動画を更新

on:
  schedule:
    # GitHub Actions の cron は UTC。日本時間 17:52・18:42・19:12・19:42。
    # 毎時0分の混雑を避けつつ、取組終了前から遅い投稿まで段階的に取得する。
    - cron: "52 8 * * *"
    - cron: "42 9 * * *"
    - cron: "12 10 * * *"
    - cron: "42 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-sumo-videos
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 公式チャンネルから動画を更新
        run: npm run update

      - name: データを検証
        run: npm run check

      - name: 更新があれば保存
        run: |
          if git diff --quiet -- data/bouts.json data/bouts.js; then
            echo "更新はありません"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bouts.json data/bouts.js
          git commit -m "chore: 取組動画を自動更新"
          git push
